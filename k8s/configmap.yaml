apiVersion: v1
kind: ConfigMap
metadata:
  name: geolink-config
  namespace: geolink
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  CORS_ALLOWED_ORIGINS: "*"

  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "geolink"
  POSTGRES_DB: "geolink"
  POSTGRES_SSL_MODE: "disable"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  KAFKA_BROKERS: "kafka:9092"
  KAFKA_GROUP_ID_INDEXER: "indexer-group"
  KAFKA_GROUP_ID_PERSONALIZER: "personalizer-group"

  TYPESENSE_HOST: "typesense"
  TYPESENSE_PORT: "8108"
  TYPESENSE_COLLECTION: "geonames"

  GEONAMES_FILE_PATH: "/data/allCountries.txt"
  GEONAMES_DOWNLOAD_URL: "https://download.geonames.org/export/dump/allCountries.zip"
  GEONAMES_BATCH_SIZE: "5000"

  PERSONALIZATION_GLOBAL: "true"
  VELOCITY_LIMIT: "100"
  VELOCITY_WINDOW_SECONDS: "60"
  IP_PROFILE_TTL_DAYS: "30"
  RECENT_SEARCHES_LIMIT: "10"
  SEARCH_CACHE_TTL_SECONDS: "60"
